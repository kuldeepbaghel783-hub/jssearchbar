<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        input{
            padding: 10px;
            width: 250px;
            border: 2px solid #007bff;
            border-radius: 5px;
        }

        button{
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        .card{
            width: 300px;
            margin: 20px auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h3{
            color: #007bff;
        }
    </style>

</head>
<body>

<h2>Search a student Name</h2>


<input type="text" id="searchInput" placeholder="Enter Name">
<button onclick="searchStudent()">Search</button>

<div id="result"></div>

    <script src="script.js">

    </script>
</body>
</html>
